onboarding = false

[theme]
name = "tokyo-night"

[terminal]
# Match tmux's habit of opening splits/tabs from the focused pane directory.
new_cwd = "follow"

[keys]
prefix = "ctrl+a"

# tmux window bindings map to Herdr tabs.
new_tab = "prefix+c"
previous_tab = "prefix+H"
next_tab = "prefix+L"
rename_tab = "prefix+r"
switch_tab = "prefix+1..9"

# tmux list/choose commands map to Herdr's navigation surfaces.
workspace_picker = ["prefix+w", "prefix+ctrl+w", "prefix+double_quote"]
goto = "prefix+S"

detach = "prefix+ctrl+d"
reload_config = "prefix+R"

# Keep prefix+s for split-down, matching tmux; disable Herdr's default settings key.
settings = ""
split_horizontal = ["prefix+s", "prefix+|"]
split_vertical = "prefix+v"

focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
close_pane = "prefix+X"
zoom = "prefix+z"

# Herdr exposes directional pane resizing through resize mode.
resize_mode = ["prefix+comma", "prefix+period", "prefix+minus", "prefix+="]

# Avoid collisions with tmux's prefix+X and prefix+P muscle memory.
close_tab = ""
rename_pane = ""

[[keys.command]]
key = "prefix+ctrl+c"
type = "shell"
command = '"${HERDR_BIN_PATH:-herdr}" tab create --workspace "$HERDR_ACTIVE_WORKSPACE_ID" --cwd "$HOME" --focus'
description = "new tab in home"

[[keys.command]]
key = "prefix+K"
type = "shell"
command = '"${HERDR_BIN_PATH:-herdr}" pane send-text "$HERDR_ACTIVE_PANE_ID" "clear"; "${HERDR_BIN_PATH:-herdr}" pane send-keys "$HERDR_ACTIVE_PANE_ID" enter'
description = "clear focused pane"
