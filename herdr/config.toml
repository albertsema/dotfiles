onboarding = false

[theme]
name = "catppuccin"

[theme.custom]
# Match the Catppuccin tab bar colors.
# Herdr tabs use panel_bg for the row, surface0/overlay1 for inactive tabs,
# and accent/panel_bg for the active tab.
panel_bg = "#1e1e2e"
surface0 = "#313244"
surface1 = "#45475a"
surface_dim = "#1e1e2e"
overlay0 = "#45475a"
overlay1 = "#cdd6f4"
text = "#cdd6f4"
subtext0 = "#a6adc8"
accent = "#fab387"
blue = "#89b4fa"
peach = "#fab387"

[terminal]
# Open splits and tabs from the focused pane directory.
new_cwd = "follow"

[keys]
prefix = "ctrl+a"

# Tab management.
new_tab = "prefix+c"
previous_tab = "prefix+H"
next_tab = "prefix+L"
rename_tab = "prefix+r"
close_tab = "prefix+ampersand"
switch_tab = "prefix+1..9"

# Navigation surfaces.
workspace_picker = ["prefix+w", "prefix+ctrl+w", "prefix+double_quote"]
goto = "prefix+S"

detach = "prefix+ctrl+d"
reload_config = "prefix+R"

# Keep prefix+s for split-down; leave prefix+- for resize mode.
settings = ""
split_horizontal = "prefix+s"
split_vertical = ["prefix+v", "prefix+|"]

focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
close_pane = "prefix+X"
zoom = "prefix+z"

# Herdr exposes directional pane resizing through resize mode.
resize_mode = ["prefix+comma", "prefix+period", "prefix+minus", "prefix+="]

# Pane renaming is intentionally unbound.
rename_pane = ""

[[keys.command]]
key = "prefix+ctrl+c"
type = "shell"
command = '"${HERDR_BIN_PATH:-herdr}" tab create --workspace "$HERDR_ACTIVE_WORKSPACE_ID" --cwd "$HOME" --focus'
description = "new tab in home"

[[keys.command]]
key = "prefix+K"
type = "shell"
command = '"${HERDR_BIN_PATH:-herdr}" pane send-text "$HERDR_ACTIVE_PANE_ID" "clear"; "${HERDR_BIN_PATH:-herdr}" pane send-keys "$HERDR_ACTIVE_PANE_ID" enter'
description = "clear focused pane"
