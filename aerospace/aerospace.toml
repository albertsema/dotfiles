after-startup-command = ['exec-and-forget sketchybar']

# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=0'
]

# Start AeroSpace at login
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
accordion-padding = 300

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

# ---------------------------------------------------------------------------
# Workspace layout (defaults to docked / external-monitor layout):
#   1  Google Chrome
#   2  Ghostty
#   3  Claude desktop + Obsidian   (docked)   |   Obsidian only (mbp)
#   4  Outlook + Spark             (docked)   |   Outlook + Zed (mbp)
#   5  Webex / Slack / Teams / Zoom
#   6  1Password / Cisco Secure Client
#   7  YouTube (Chrome PWA)
#   8  Codex + Zed                 (docked)   |   Claude (mbp)
#   9  (unused docked)                        |   Codex (mbp)
#
# When undocked, run `~/dotfiles/aerospace/relayout.sh` (alt-shift-r)
# to shuffle Claude / Zed / Codex into their MBP-only slots.
# ---------------------------------------------------------------------------

[[on-window-detected]]
if.app-name-regex-substring = '(?i)google chrome'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)spark'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)webex'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)microsoft teams'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = ['move-node-to-workspace 6']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)1password'
run = ['move-node-to-workspace 6']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)cisco secure client'
run = ['move-node-to-workspace 6']

# YouTube Chrome PWA
[[on-window-detected]]
if.app-name-regex-substring = '^YouTube$'
run = ['move-node-to-workspace 7']

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = ['move-node-to-workspace 8']

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['move-node-to-workspace 8']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)^zed$'
run = ['move-node-to-workspace 8']

# Float System Settings so it doesn't disrupt tiling layouts
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout floating']


# Possible values: (qwerty|dvorak)
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
[gaps]
inner.horizontal = [{ monitor.main = 0 }, 0]
outer.left =       [{ monitor.main = 0 }, 0]
outer.right =      [{ monitor.main = 60 }, 20]
outer.bottom =     [{ monitor.main = 0 }, 0]
outer.top =        [{ monitor.main = 0 }, 0]


# 'main' binding mode declaration
[mode.main.binding]

alt-ctrl-shift-f = 'fullscreen --no-outer-gaps'
alt-ctrl-f = 'layout floating tiling'

alt-shift-left = 'join-with left'
alt-shift-down = 'join-with down'
alt-shift-up = 'join-with up'
alt-shift-right = 'join-with right'

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Re-layout windows for the currently connected displays
alt-shift-r = 'exec-and-forget /Users/albertsema/dotfiles/aerospace/relayout.sh'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = 'mode service'
alt-shift-enter = 'mode apps'

# App-launch shortcuts
alt-z = 'exec-and-forget open -a /Applications/Zed.app'
alt-o = 'exec-and-forget open -a /Applications/Obsidian.app'
alt-g = 'exec-and-forget open -a /Applications/Ghostty.app'
alt-c = 'exec-and-forget open -a /Applications/Claude.app'


# 'service' binding mode declaration.
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

[mode.apps.binding]
# Reserved for future per-app launchers; main launchers live in [mode.main.binding].

# ---------------------------------------------------------------------------
# Pin workspaces to physical monitors.
#   Built-in              -> MBP Liquid Retina XDR display
#   Apple Studio Display  -> external
#   Dell 32"              -> external (matches DELL U/DELL S patterns)
# Workspaces that are not assigned (8, 9 here) fall through to the
# remaining monitor, so a single-display setup still gets every workspace.
# ---------------------------------------------------------------------------
[workspace-to-monitor-force-assignment]
1 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
2 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
3 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
4 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
5 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
6 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
7 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
8 = ['Studio Display', '^DELL.*$', 'Built-in Retina Display']
9 = ['Built-in Retina Display', 'Studio Display', '^DELL.*$']
