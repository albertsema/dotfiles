#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

strict_mode = true
cache = true
dir_length = 1

[default_session]
preview_command = "eza --all --git --icons --color=always {}"

# Only direct child projects under ~/workspace match this session config.
[[wildcard]]
pattern = "~/workspace/*"
disable_startup_command = true
preview_command = "eza --all --git --icons --color=always {}"
